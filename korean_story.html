<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Story Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
            min-height: 100vh;
            color: #1e1b4b;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(79, 70, 229, 0.1);
        }

        .story-display {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #818cf8 #f3f4f6;
            white-space: pre-wrap;
            word-break: keep-all;
        }

        .word-span {
            display: inline-block;
            transition: all 0.3s ease;
            padding: 2px 4px;
            border-radius: 6px;
            margin: 0 2px;
        }

        .highlight {
            background-color: #a855f7;
            color: white;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
            transform: scale(1.1);
        }

        .btn-gradient {
            background: linear-gradient(to right, #6366f1, #a855f7);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .story-card {
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .story-card:hover {
            border-color: #a855f7;
            transform: translateY(-5px);
            background: white;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- PAGE 1: MENU -->
    <div id="pageMenu" class="max-w-5xl mx-auto space-y-8">
        <header class="text-center space-y-4">
            <h1 class="text-5xl font-bold text-indigo-900">
                <span class="text-purple-600">✨</span> 한국어 동화 마을
            </h1>
            <p class="text-xl text-indigo-500 font-medium">읽고 싶은 이야기를 선택하세요!</p>
        </header>

        <!-- Story List (Starts empty as requested) -->
        <div id="storyList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Your stories will appear here -->
        </div>

        <div id="emptyMessage" class="text-center p-12 glass-panel rounded-3xl border-dashed border-2 border-indigo-200">
            <p class="text-indigo-400">아직 등록된 이야기가 없습니다. 코드를 수정하여 이야기를 추가해주세요.</p>
        </div>

        <div class="text-center pt-8">
            <button onclick="showReader('')" class="text-indigo-600 font-bold hover:text-purple-600 underline">
                + 직접 이야기 입력하기 (Manual Entry)
            </button>
        </div>
    </div>

    <!-- PAGE 2: READER -->
    <div id="pageReader" class="max-w-5xl mx-auto hidden space-y-6">
        <div class="flex items-center justify-between">
            <button onclick="showMenu()" class="flex items-center text-indigo-600 font-bold hover:text-purple-600">
                <span class="mr-2">⬅️</span> 목록으로 돌아가기
            </button>
            <h2 id="currentStoryTitle" class="text-2xl font-bold text-indigo-900">이야기 읽기</h2>
        </div>

        <div id="workspace" class="glass-panel rounded-3xl p-6 flex flex-col min-h-[70vh]">
            <!-- Loading Indicator for File Fetching -->
            <div id="fetchLoader" class="hidden flex flex-col items-center justify-center flex-grow space-y-4">
                <div class="spinner !border-indigo-500 !w-12 !h-12"></div>
                <p class="text-indigo-600 font-medium">이야기 파일을 불러오는 중...</p>
            </div>

            <textarea 
                id="storyInput" 
                placeholder="여기에 한국어 이야기를 입력하세요..."
                class="w-full h-full flex-grow text-2xl md:text-3xl leading-relaxed bg-transparent border-none outline-none text-gray-800 placeholder-gray-300 p-4 resize-none"
            ></textarea>
            
            <div id="storyDisplay" class="story-display hidden w-full h-full flex-grow text-2xl md:text-3xl leading-relaxed p-4"></div>
        </div>

        <div class="flex flex-wrap justify-center gap-4">
            <button id="readBtn" class="btn-gradient px-12 py-5 rounded-full text-white text-xl font-bold flex items-center shadow-lg">
                <span id="btnIcon" class="mr-3">🔊</span>
                <span id="btnText">Listen (여자 목소리)</span>
            </button>
            
            <button id="clearBtn" class="bg-white text-indigo-400 border-2 border-indigo-100 px-8 py-5 rounded-full text-xl font-bold hover:bg-indigo-50 transition-colors">
                🗑️ Clear
            </button>
        </div>
    </div>

    <script>
        /**
         * DATA SECTION: ADD YOUR FILE PATHS HERE
         * Example: { title: "토끼와 거북이", path: "stories/rabbit.txt", icon: "🐢" }
         **************************************************/
        const PRELOADED_STORIES = [
            {
                id: 1,
                title: "토끼와 거북이",
                description: "경주를 하는 토끼와 거북이 이야기",
                icon: "🐢",
                path: "Kstory/001_story.txt" // <-- INSERT PATH HERE
            },
            
        ];

        const apiKey = "";
        const pageMenu = document.getElementById('pageMenu');
        const pageReader = document.getElementById('pageReader');
        const storyList = document.getElementById('storyList');
        const emptyMessage = document.getElementById('emptyMessage');
        const storyInput = document.getElementById('storyInput');
        const storyDisplay = document.getElementById('storyDisplay');
        const fetchLoader = document.getElementById('fetchLoader');
        const readBtn = document.getElementById('readBtn');
        const clearBtn = document.getElementById('clearBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const currentStoryTitle = document.getElementById('currentStoryTitle');

        let isPlaying = false;
        let audioContext;
        let currentSource;
        let highlightInterval;

        function initMenu() {
            storyList.innerHTML = '';
            if (PRELOADED_STORIES.length === 0) {
                emptyMessage.classList.remove('hidden');
                return;
            }
            emptyMessage.classList.add('hidden');
            PRELOADED_STORIES.forEach(story => {
                const card = document.createElement('div');
                card.className = 'glass-panel story-card rounded-2xl p-6 flex flex-col items-center text-center space-y-3';
                card.innerHTML = `
                    <div class="text-5xl mb-2">${story.icon}</div>
                    <h3 class="text-xl font-bold text-indigo-900">${story.title}</h3>
                    <p class="text-sm text-indigo-400">${story.description || '이야기 파일 읽기'}</p>
                `;
                card.onclick = () => selectStory(story);
                storyList.appendChild(card);
            });
        }

        async function selectStory(story) {
            currentStoryTitle.textContent = story.title;
            showReader(''); // Open reader first
            
            if (story.path) {
                setFetchLoading(true);
                try {
                    const response = await fetch(story.path);
                    if (!response.ok) throw new Error("File not found");
                    const text = await response.text();
                    storyInput.value = text;
                } catch (err) {
                    storyInput.value = "파일을 불러오는 데 실패했습니다: " + story.path;
                } finally {
                    setFetchLoading(false);
                }
            } else if (story.content) {
                storyInput.value = story.content;
            }
        }

        function setFetchLoading(isLoading) {
            if (isLoading) {
                fetchLoader.classList.remove('hidden');
                storyInput.classList.add('hidden');
            } else {
                fetchLoader.classList.add('hidden');
                storyInput.classList.remove('hidden');
            }
        }

        function showReader(content) {
            pageMenu.classList.add('hidden');
            pageReader.classList.remove('hidden');
            storyInput.value = content;
            storyInput.classList.remove('hidden');
            storyDisplay.classList.add('hidden');
            window.scrollTo(0, 0);
        }

        function showMenu() {
            stopEverything();
            pageReader.classList.add('hidden');
            pageMenu.classList.remove('hidden');
        }

        // --- Reader Logic (Same as perfected version) ---

        function prepareDisplay(text) {
            storyDisplay.innerHTML = '';
            const words = text.split(/(\s+)/);
            words.forEach((word, index) => {
                if (word.trim().length === 0) {
                    storyDisplay.appendChild(document.createTextNode(word));
                } else {
                    const span = document.createElement('span');
                    span.className = 'word-span';
                    span.textContent = word;
                    span.id = `word-${index}`;
                    storyDisplay.appendChild(span);
                }
            });
        }

        async function playKoreanStory(text) {
            if (!text.trim()) return;
            setLoading(true);
            prepareDisplay(text);
            storyInput.classList.add('hidden');
            storyDisplay.classList.remove('hidden');

            const payload = {
                contents: [{ parts: [{ text: `Read clearly in a warm, professional female Korean storyteller voice: ${text}` }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                },
                model: "gemini-2.5-flash-preview-tts"
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                const base64Audio = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                const mimeType = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.mimeType;
                if (!base64Audio) throw new Error();
                const sampleRate = parseInt(mimeType.match(/sample_rate=(\d+)/)?.[1] || "24000");
                playAndHighlight(base64Audio, sampleRate);
            } catch (e) {
                stopEverything();
            }
        }

        function playAndHighlight(base64Data, sampleRate) {
            const binaryString = atob(base64Data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            const pcm16 = new Int16Array(bytes.buffer);
            const float32 = new Float32Array(pcm16.length);
            for (let i = 0; i < pcm16.length; i++) float32[i] = pcm16[i] / 32768.0;

            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const buffer = audioContext.createBuffer(1, float32.length, sampleRate);
            buffer.copyToChannel(float32, 0);

            if (currentSource) currentSource.stop();
            currentSource = audioContext.createBufferSource();
            currentSource.buffer = buffer;
            currentSource.connect(audioContext.destination);

            const duration = buffer.duration;
            const spans = storyDisplay.querySelectorAll('.word-span');
            const msPerWord = (duration * 1000) / (spans.length || 1);

            currentSource.onended = stopEverything;
            const startTime = Date.now();
            highlightInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const targetIdx = Math.floor(elapsed / msPerWord);
                if (targetIdx < spans.length) {
                    spans.forEach(s => s.classList.remove('highlight'));
                    spans[targetIdx].classList.add('highlight');
                    spans[targetIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 50);

            currentSource.start();
            setLoading(false);
            isPlaying = true;
            btnIcon.textContent = "⏹️";
            btnText.textContent = "Stop Reading";
        }

        function stopEverything() {
            if (currentSource) try { currentSource.stop(); } catch(e) {}
            clearInterval(highlightInterval);
            isPlaying = false;
            btnIcon.textContent = "🔊";
            btnText.textContent = "Listen (여자 목소리)";
            storyInput.classList.remove('hidden');
            storyDisplay.classList.add('hidden');
            setLoading(false);
        }

        function setLoading(loading) {
            if (loading) {
                btnText.innerHTML = `<span class="spinner"></span>준비 중...`;
                readBtn.disabled = true;
            } else {
                btnText.textContent = isPlaying ? "Stop Reading" : "Listen (여자 목소리)";
                readBtn.disabled = false;
            }
        }

        readBtn.addEventListener('click', () => {
            if (isPlaying) stopEverything();
            else playKoreanStory(storyInput.value);
        });

        clearBtn.addEventListener('click', () => {
            stopEverything();
            storyInput.value = "";
            storyInput.focus();
        });

        initMenu();
    </script>
</body>
</html>
