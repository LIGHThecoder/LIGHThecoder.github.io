<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva la Vida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-blue: #2563eb;
            --flame-cyan: #00d4ff;
            --flame-deep: #1e40af;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #000000, #1a1a1a, #ffffff, #f0f0f0);
            background-size: 400% 400%;
            animation: moveGradient 12s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            padding: 1rem;
            overflow: hidden;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* REENGINEERED GLASS WITH ARTISTIC BLUE FLAME EFFECT */
        .glass-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 85vh;
            max-height: 800px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px) saturate(150%) contrast(90%);
            -webkit-backdrop-filter: blur(30px) saturate(150%) contrast(90%);
            border-radius: 2.5rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.5s ease;
            z-index: 10;
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.15),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* THE ARTISTIC FLAME BORDER SYSTEM */
        .flame-border {
            position: absolute;
            inset: -15px;
            pointer-events: none;
            z-index: -1;
            filter: url(#flame-filter); /* Artistic distortion for actual flame look */
        }

        .flame-layer {
            position: absolute;
            inset: 10px;
            border-radius: 3rem;
            border: 4px solid transparent;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: destination-out;
        }

        /* Blue Fire Gradient Animation */
        .flame-layer-1 {
            background: conic-gradient(from var(--angle), transparent, var(--flame-cyan), var(--accent-blue), var(--flame-deep), var(--flame-cyan), transparent);
            animation: rotateAngle 3s linear infinite, flameFlicker 0.1s infinite alternate;
            filter: blur(2px);
        }

        .flame-layer-2 {
            background: conic-gradient(from calc(var(--angle) + 180deg), transparent, #fff, var(--flame-cyan), transparent);
            animation: rotateAngle 5s linear reverse infinite, flameFlicker 0.15s infinite alternate;
            filter: blur(6px);
            opacity: 0.6;
        }

        /* Artistic Glow around all 4 borders */
        .glass-container::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 2.5rem;
            padding: 3px;
            background: linear-gradient(var(--angle), var(--flame-cyan), transparent 50%, var(--accent-blue));
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: destination-out;
            animation: rotateAngle 6s linear infinite;
            filter: drop-shadow(0 0 15px var(--flame-cyan));
        }

        @keyframes flameFlicker {
            0% { transform: scale(1.005); opacity: 0.9; }
            100% { transform: scale(0.995); opacity: 1; }
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes rotateAngle {
            to { --angle: 360deg; }
        }

        /* Rest of your existing styles */
        .page {
            position: absolute;
            inset: 0;
            padding: clamp(1.5rem, 5vw, 2.5rem);
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 1024px) {
            .glass-container {
                max-width: 400px;
                height: 750px;
            }
        }

        @media (max-width: 480px) {
            .glass-container {
                height: 90vh;
                border-radius: 2rem;
            }
            .cursive-title { font-size: 2.8rem; }
            .glass-container::after { border-radius: 2.1rem; }
        }

        .cursive-title {
            font-family: 'Great Vibes', cursive;
            color: var(--accent-blue);
            filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.4));
            line-height: 1.1;
        }

        .hidden-left { transform: translateX(-100%) skewX(-5deg); opacity: 0; pointer-events: none; }
        .hidden-right { transform: translateX(100%) skewX(5deg); opacity: 0; pointer-events: none; }

        .song-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .song-card:hover {
            background: rgba(37, 99, 235, 0.15);
            border-color: var(--accent-blue);
            transform: scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
        }

        .album-art-container {
            width: 85%;
            aspect-ratio: 1/1;
            position: relative;
            margin: 0 auto 2rem;
        }

        .album-art-big {
            position: absolute;
            inset: 0;
            border-radius: 2rem;
            background-size: cover;
            background-position: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: transform 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            background-color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .album-art-big img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.9);
        }

        .playing .album-art-big { 
            transform: scale(1.08); 
            box-shadow: 0 30px 60px rgba(37, 99, 235, 0.2);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 3px;
            background: rgba(37, 99, 235, 0.1);
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent-blue);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-blue);
            border: 2px solid white;
        }

        * { color: var(--accent-blue) !important; }

        .btn-play {
            background-color: #ffffff !important;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
        }
        
        #songList::-webkit-scrollbar { width: 3px; }
        #songList::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- SVG Filters for the Artistic Flame Effect -->
    <svg style="position: fixed; width: 0; height: 0;">
        <filter id="flame-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.03 0.15" numOctaves="3" seed="5">
                <animate attributeName="baseFrequency" dur="10s" values="0.03 0.15;0.05 0.25;0.03 0.15" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="25" />
        </filter>
    </svg>

    <div class="glass-container">
        <!-- Flame Visual Elements -->
        <div class="flame-border">
            <div class="flame-layer flame-layer-1"></div>
            <div class="flame-layer flame-layer-2"></div>
        </div>

        <!-- PAGE 1: LIBRARY -->
        <div id="libraryPage" class="page">
            <div class="mb-10 text-center">
                <h1 class="cursive-title text-4xl">PURPOSE</h1>
                <div class="h-px w-12 bg-blue-600/30 mx-auto mt-4"></div>
                <p class="font-bold text-[19px] uppercase tracking-[0.6em] mt-4 opacity-50">김남전</p>
            </div>
            
            <div id="songList" class="flex-1 overflow-y-auto space-y-4 pr-1"></div>
        </div>

        <!-- PAGE 2: PLAYER -->
        <div id="playerPage" class="page hidden-right">
            <div class="flex justify-between items-center mb-6">
                <button onclick="showPage('library')" class="p-3 border border-blue-600/20 rounded-2xl hover:bg-white/10 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M164.24,203.76a6,6,0,1,1-8.48,8.48l-80-80a6,6,0,0,1,0-8.48l80-80a6,6,0,0,1,8.48,8.48L92.49,128Z"></path></svg>
                </button>
                <span class="text-[9px] font-black uppercase tracking-[0.5em]">Reflection</span>
                <div class="w-10"></div>
            </div>

            <div id="playerContent" class="flex-1 flex flex-col items-center justify-around">
                <div class="album-art-container">
                    <div id="playerArt" class="album-art-big">
                        <img id="posterImg" src="" alt="Album Art" style="display: none;">
                    </div>
                </div>
                
                <div class="text-center w-full px-4">
                    <h2 id="playerTitle" class="text-2xl font-extrabold tracking-tighter mb-2">Song Title</h2>
                    <p id="playerArtist" class="font-bold text-[10px] uppercase tracking-[0.3em] opacity-60">Artist Name</p>
                </div>

                <div class="w-full px-4">
                    <input type="range" id="progressBar" value="0" step="0.1">
                    <div class="flex justify-between text-[10px] font-bold mt-4 tracking-tighter">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="flex items-center justify-center gap-8 w-full pb-6">
                    <button class="transition-all hover:scale-110 active:scale-95" onclick="skip(-10)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" viewBox="0 0 256 256"><path d="M224,48V208a8,8,0,0,1-12.71,6.47l-96-72a8,8,0,0,1,0-12.94l96-72A8,8,0,0,1,224,48ZM104,48V208a8,8,0,0,1-16,0V48a8,8,0,0,1,16,0Z"></path></svg>
                    </button>

                    <button id="playBtn" class="w-20 h-20 rounded-[2rem] btn-play flex items-center justify-center shadow-xl hover:rotate-3 transition-all active:scale-90" onclick="togglePlay()">
                        <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 256 256"><path d="M240,128a15.74,15.74,0,0,1-7.6,13.51L88.32,229.75a16,16,0,0,1-16.2.3,15.86,15.86,0,0,1-8.12-13.81V40.16a15.86,15.86,0,0,1,8.12-13.81,16,16,0,0,1,16.2.3L232.4,114.49A15.74,15.74,0,0,1,240,128Z"></path></svg>
                    </button>

                    <button class="transition-all hover:scale-110 active:scale-95" onclick="skip(10)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" viewBox="0 0 256 256"><path d="M164.71,121.53l-96-72A8,8,0,0,0,56,56V200a8,8,0,0,0,12.71,6.47l96-72a8,8,0,0,0,0-12.94ZM176,48a8,8,0,0,1,16,0V208a8,8,0,0,1-16,0Z"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div> 

    <audio id="audioElement" crossorigin="anonymous" controlsList="nodownload"></audio>

    <script> 
        const audio = document.getElementById('audioElement');
        const songList = document.getElementById('songList');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const playIcon = document.getElementById('playIcon');
        
        let currentSongIndex = 0;

        const songs = [
            { title: "a PRESENT from the PAST", artist: "Nikhil (ORIGINALS)", poster: "posters and audio/01 track/a present from past (art work).png", src: "posters and audio/01 track/a PRESENT from the PAST.m4a" },
            { title: "May be NEXT TIME with YOU", artist: "Nikhil (ORIGINALS)", poster: "posters and audio/02 track/may be next time with you (art work).png", src: "posters and audio/02 track/may be next time with you........m4a" },
            { title: "소나기", artist: "Nikhil", poster: "posters and audio/03 track/image04.png", src: "posters and audio/03 track/audio03.m4a" },
            { title: "Your HERO", artist: "Nikhil (ORIGINALS)", poster: "posters and audio/04 track/heroimag.png", src: "posters and audio/04 track/Your HERO.m4a" },
            { title: "वेड तुझा", artist: "Nikhil", poster: "posters and audio/05 track/ved.png", src: "posters and audio/05 track/ved.m4a" },
            { title: "सैयारा", artist: "Nikhil", poster: "posters and audio/06 track/Saiyaara.png", src: "posters and audio/06 track/Saiyaara.m4a" },
            { title: "Coming for You", artist: "Nikhil", poster: "posters and audio/07 track/Coming for You.png", src: "posters and audio/07 track/Coming for You.m4a" }
        ];

        function initLibrary() {
            songList.innerHTML = '';
            songs.forEach((song, index) => {
                const card = document.createElement('div');
                card.className = 'song-card p-4 flex items-center gap-4';
                card.onclick = () => selectSong(index);
                card.innerHTML = `
                    <div class="w-12 h-12 rounded-xl bg-cover bg-center shadow-lg flex-shrink-0 grayscale" style="background-image: url('${encodeURI(song.poster)}')"></div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold truncate text-base mb-1">${song.title}</h4>
                        <p class="text-[9px] font-black uppercase tracking-widest opacity-60">${song.artist}</p>
                    </div>
                `;
                songList.appendChild(card);
            });
        }

        function showPage(pageName) {
            const lib = document.getElementById('libraryPage');
            const play = document.getElementById('playerPage');
            if (pageName === 'library') {
                lib.classList.remove('hidden-left');
                play.classList.add('hidden-right');
            } else {
                lib.classList.add('hidden-left');
                play.classList.remove('hidden-right');
            }
        }

        async function selectSong(index) {
            currentSongIndex = index;
            const song = songs[index];
            audio.pause();
            audio.currentTime = 0;
            audio.src = encodeURI(song.src);
            
            const posterImg = document.getElementById('posterImg');
            if (song.poster) {
                posterImg.src = encodeURI(song.poster);
                posterImg.style.display = 'block';
            }
            
            document.getElementById('playerTitle').innerText = song.title;
            document.getElementById('playerArtist').innerText = song.artist;
            showPage('player');
            
            audio.load();
            setTimeout(() => {
                audio.play().then(() => updatePlayUI(true)).catch(() => updatePlayUI(false));
            }, 100);
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play().then(() => updatePlayUI(true)).catch(() => updatePlayUI(false));
            } else {
                audio.pause();
                updatePlayUI(false);
            }
        }

        function updatePlayUI(playing) {
            const playerPage = document.getElementById('playerPage');
            if (playing) {
                playerPage.classList.add('playing');
                playIcon.innerHTML = `<path d="M208,48V208a8,8,0,0,1-8,8H160a8,8,0,0,1-8-8V48a8,8,0,0,1,8-8h40A8,8,0,0,1,208,48ZM96,40H56a8,8,0,0,0-8,8V208a8,8,0,0,0,8,8H96a8,8,0,0,0,8-8V48A8,8,0,0,0,96,40Z"></path>`;
            } else {
                playerPage.classList.remove('playing');
                playIcon.innerHTML = `<path d="M240,128a15.74,15.74,0,0,1-7.6,13.51L88.32,229.75a16,16,0,0,1-16.2.3,15.86,15.86,0,0,1-8.12-13.81V40.16a15.86,15.86,0,0,1,8.12-13.81,16,16,0,0,1,16.2.3L232.4,114.49A15.74,15.74,0,0,1,240,128Z"></path>`;
            }
        }

        function skip(seconds) { audio.currentTime += seconds; }
        function formatTime(secs) {
            if (isNaN(secs)) return "0:00";
            const min = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${min}:${s < 10 ? '0' : ''}${s}`;
        }

        audio.addEventListener('loadedmetadata', () => {
            progressBar.max = audio.duration;
            durationEl.innerText = formatTime(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            if(!progressBar.dragging) progressBar.value = audio.currentTime;
            currentTimeEl.innerText = formatTime(audio.currentTime);
        });

        progressBar.addEventListener('input', () => { progressBar.dragging = true; });
        progressBar.addEventListener('change', () => {
            audio.currentTime = progressBar.value;
            progressBar.dragging = false;
        });

        window.onload = initLibrary;
    </script>
</body>
</html>
